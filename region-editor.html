<!doctype html><html><head><meta charset="utf-8"><title>Region editor</title>
<style>
 :root{--bg:#1b1330;--panel:#241a3f;--ink:#ece4f7;--muted:#b7a9d6;--line:#4a3a72;--accent:#8a5cf5}
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,Segoe UI,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
 #bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line)}
 #bar .grp{display:flex;align-items:center;gap:6px;padding-right:10px;margin-right:4px;border-right:1px solid var(--line)}
 #bar .grp:last-child{border-right:none}
 button,select,input[type=number],input[type=text]{background:#2f2452;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;cursor:pointer}
 button.on{background:linear-gradient(135deg,#c75fb0,#8a5cf5);border-color:transparent;color:#fff;font-weight:600}
 button.go{background:linear-gradient(135deg,#c75fb0,#8a5cf5);border-color:transparent;color:#fff;font-weight:600}
 button:hover{filter:brightness(1.12)}
 input[type=number]{width:58px}
 label.cb{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);cursor:pointer}
 #main{flex:1;display:flex;min-height:0}
 #stage{flex:1;min-width:0;position:relative;background:#0d0a18}
 #cv{width:100%;height:100%;display:block;cursor:crosshair}
 #side{width:340px;flex:none;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
 #side h3{margin:0;padding:10px 12px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
 #panel{flex:1;overflow:auto;padding:6px}
 .rrow{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:7px}
 .rrow.fresh{background:rgba(138,92,245,.18);box-shadow:inset 0 0 0 1px var(--accent)}
 .rrow .sw{width:14px;height:14px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,.3)}
 .rrow .rlab{font-weight:700;color:#ffe27a;min-width:30px;font-size:13px}
 .rrow .rmeta{font-size:11px;color:var(--muted);min-width:96px}
 .rrow input{flex:1;min-width:0;padding:4px 7px;font-size:12px}
 #exportWrap{display:none;border-top:1px solid var(--line);padding:8px}
 #exportArea{width:100%;height:80px;resize:none;font-family:ui-monospace,Consolas,monospace;font-size:10px;word-break:break-all}
 #status{padding:6px 12px;background:#15102b;border-top:1px solid var(--line);font-size:12px;color:var(--muted);min-height:28px}
 .hint{font-size:11px;color:var(--muted);max-width:560px}
 a.dl{display:inline-block;text-decoration:none}
</style></head><body>
<div id="bar">
  <div class="grp">
    <label class="cb" style="font-weight:600;color:var(--ink)">🖼 Image <input type="file" id="file" accept="image/*" style="display:none"></label>
    <button onclick="document.getElementById('file').click()">Choose…</button>
  </div>
  <div class="grp">
    <input type="text" id="mapName" placeholder="Map name" value="New Map" style="width:120px">
    seed <input type="number" id="seed" value="424242">
    <button id="btnReroll" title="New random plot placement">⟳ plots</button>
  </div>
  <div class="grp">
    <span style="font-size:12px;color:var(--muted)">Resolution</span>
    <button id="btnResDown" title="−1% cells (aspect locked)">−</button>
    <input type="range" id="res" min="2500" max="57600" value="7680" step="1" style="width:140px;vertical-align:middle" title="Pixel-art resolution (aspect locked). Higher = longer game + more detail.">
    <button id="btnResUp" title="+1% cells (aspect locked)">+</button>
    <span id="resLabel" style="font-size:12px;color:var(--ink);min-width:118px;display:inline-block">— × — · —</span>
  </div>
  <div class="grp">
    <span style="font-size:11px;color:var(--muted)" title="Manual override (can break aspect)">exact</span>
    <input type="number" id="dimW" placeholder="auto"> × <input type="number" id="dimH" placeholder="auto">
    <button id="btnRescan" title="Re-scan with these exact dimensions">rescan</button>
  </div>
  <div class="grp">
    <button id="btnDraw" class="on">✎ Draw</button>
    <button id="btnErase">⌫ Erase</button>
    <button id="btnClear">clear</button>
    <button id="btnUndo">↶ undo</button>
  </div>
  <div class="grp">
    <label class="cb"><input type="checkbox" id="cbAutoClose"> auto-close</label>
    <label class="cb"><input type="checkbox" id="cbShowRegions" checked> show regions</label>
    <button id="btnMagnet" title="Add walls along strong image edges">⌁ edges</button>
    <input type="number" id="magThresh" value="220" title="edge gradient threshold">
  </div>
  <div class="grp">
    <button id="btnZoomOut">−</button><button id="btnZoomIn">+</button><button id="btnFit">⛶ fit</button>
  </div>
  <div class="grp">
    <button id="btnCheck">✓ check</button>
    <button id="btnExport" class="go">⇪ Export</button>
  </div>
</div>
<div id="main">
  <div id="stage"><canvas id="cv"></canvas></div>
  <div id="side">
    <h3><span>Regions &amp; quotes</span><span id="regCount">0 regions</span></h3>
    <div id="panel"></div>
    <div id="exportWrap">
      <textarea id="exportArea" readonly></textarea>
      <div style="display:flex;gap:6px;margin-top:6px">
        <a class="dl" id="dl"><button>💾 Download</button></a>
        <button id="btnCopy">📋 Copy</button>
      </div>
    </div>
  </div>
</div>
<div id="status"></div>

// board dimensions are per-map, derived from each image's aspect ratio at a
// roughly constant cell budget (wide image → wide board, square → square).
// Grid arrays are allocated once at MAXN and we use the first N entries, so
// switching maps never reallocates.
let GW = 120, GH = 64, N = GW * GH;
const MAXN = 320 * 180;     // max board = 57,600 cells (e.g. 320×180 at 16:9); editor caps N ≤ MAXN
const CELL_TARGET = 7680;   // ~120*64 — default per-map cell budget (auto-sized maps)
function setDims(gw, gh){ GW = gw; GH = gh; N = GW * GH; }
function dimsForImage(image, map){
  if (map && map.gw && map.gh) { setDims(map.gw, map.gh); return; }
  const a = (image && image.naturalWidth && image.naturalHeight) ? image.naturalWidth / image.naturalHeight : 1;
  let gw = Math.max(40, Math.min(180, Math.round(Math.sqrt(CELL_TARGET * a))));
  let gh = Math.max(40, Math.min(180, Math.round(CELL_TARGET / gw)));
  setDims(gw, gh);
}
let SEED = 1337;   // set per map before generating — each map is its own puzzle

// ---------- maps ----------
// each map is a different painting woven onto the SAME seeded grid (regions,
// sudoku and picross layouts are identical; only the picture, its clues and

// ---------- deterministic RNG ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

// seeded rejection-placement of the plot kit into the current GW×GH board:
// 1-cell gaps between plots, and picross clue-strips (ceil(n/2) cells up & left)
// kept on-canvas. Larger/strip-needy patches go first.
function placePlots(seed){
  const rng = mulberry32((seed ^ 0x9e3779b9) >>> 0);
  const placed = [];
  const hit = (x, y, w, h) => placed.some(r => !(x + w + 1 <= r.x || r.x + r.w + 1 <= x || y + h + 1 <= r.y || r.y + r.h + 1 <= y));
  function place(w, h, mL, mT){
    const xMax = GW - w, yMax = GH - h;
    if (xMax < mL || yMax < mT) return null;
    for (let t = 0; t < 3000; t++) {
      const x = mL + ((rng() * (xMax - mL + 1)) | 0);
      const y = mT + ((rng() * (yMax - mT + 1)) | 0);
      if (hit(x, y, w, h)) continue;
      placed.push({ x, y, w, h });
      return { x, y };
    }
    return null;
  }
  const picross = [];
  PIC_KIT.forEach(n => { const m = Math.ceil(n / 2); const p = place(n, n, m, m); if (p) picross.push({ x: p.x, y: p.y, n }); });
  const zones = [];
  SUD_KIT.forEach(s => { const p = place(s.n, s.n, 0, 0); if (p) zones.push(Object.assign({ x: p.x, y: p.y }, s)); });
  zones.forEach((z, k) => { z.idx = k; z.name = 'Plot ' + ROMAN[k]; });
  picross.forEach((p, k) => { p.idx = k; p.name = 'Patch ' + ROMAN[k]; });
  return { zones, picross };
}

// Runs on every map; a no-op for well-formed ones.
function healRegions(){

    let best = -1, bestC = -1;
    for (const [r, c] of tally) if (c > bestC) { bestC = c; best = r; }
    z.attached = best >= 0 ? best : 0;   // fallback: first region (rare: plot fully enclosed by plots)
    // every pixel region this plot borders (touches partially or fully). The
    // plot's home is the *most*-bordered one (attached); but a region reveals
    // only once EVERY plot inside it is solved, so record them all.
    z.borderRegions = [...tally.keys()];
    for (const r of tally.keys()) regionPlots[r].push(z.region);
  }
}

function buildLayout(){
  choosePlots();
  fillPlotCells();
  const L = mapDef().layout && HAND_LAYOUTS[mapDef().layout];
  if (L) applyHandPartition(L); else growRegions();   // hand-drawn partition, or the watershed
  healRegions();   // guarantee every region is one connected blob (no stray cells to hunt)
  attachPlots();
  picrossByRegion.clear();
  for (const p of PICROSS) picrossByRegion.set(p.region, p);
  for (let y = 0; y < GH; y++) for (let x = 0; x < GW; x++) {
    const i = y * GW + x;
    const list = [];
    for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < GW && ny >= 0 && ny < GH && regionOf[ny * GW + nx] === regionOf[i]) list.push(ny * GW + nx);
    }
    nbhd[i] = list;
  }
  regionDone = new Array(REG_COUNT).fill(false);
  regionDoneAt = new Array(REG_COUNT).fill(0);
}

// ---------- puzzle data ----------
const sol    = new Uint8Array(MAXN);          // 1 = light, 0 = dark
const clue   = new Int8Array(MAXN).fill(-1);  // -1 = no clue, else 0..9
const state  = new Uint8Array(MAXN);          // 0 unknown, 1 light, 2 dark
const cellCol = new Array(MAXN);              // art color per cell
const locked = new Uint8Array(MAXN);          // pre-stitched starter tiles — always empty since repairTexture(); kept as the stall fallback's channel
const edge   = new Uint8Array(MAXN);          // image edge strength (for content-aware borders)
let regionDone = [];
let regionDoneAt = [];
let regionPlots = [];   // regionPlots[r] = ids of every sudoku/picross plot touching pixel region r (partially or fully); region r reveals only once they're all solved too
const wrong = new Set();


function sampleImage(image){
  const off = document.createElement('canvas');
  off.width = GW; off.height = GH;
  const octx = off.getContext('2d', { willReadFrequently: true });
  octx.imageSmoothingEnabled = false;
  octx.drawImage(image, 0, 0, GW, GH);
  const d = octx.getImageData(0, 0, GW, GH).data;

  // luminance → adaptive threshold (global Otsu blended with a local mean)
  const lum = new Float32Array(N), hist = new Uint32Array(256);
  for (let i = 0; i < N; i++) {
    const r = d[i*4], g = d[i*4+1], b = d[i*4+2];
    cellCol[i] = `rgb(${r},${g},${b})`;
    const L = 0.299*r + 0.587*g + 0.114*b;
    lum[i] = L; hist[L | 0]++;
  }
  // edge strength = local colour gradient; region borders prefer to fall here
  for (let y = 0; y < GH; y++) for (let x = 0; x < GW; x++) {
    const i = y * GW + x;
    let e = 0;
    if (x < GW - 1) { const j = i + 1;  e += Math.abs(d[i*4]-d[j*4]) + Math.abs(d[i*4+1]-d[j*4+1]) + Math.abs(d[i*4+2]-d[j*4+2]); }
    if (y < GH - 1) { const j = i + GW; e += Math.abs(d[i*4]-d[j*4]) + Math.abs(d[i*4+1]-d[j*4+1]) + Math.abs(d[i*4+2]-d[j*4+2]); }
    edge[i] = Math.min(255, e >> 1);
  }
  let sum = 0; for (let t = 0; t < 256; t++) sum += t * hist[t];
  let sumB = 0, wB = 0, best = 0, otsu = 127;
  for (let t = 0; t < 256; t++) {
    wB += hist[t]; if (!wB) continue;
    const wF = N - wB; if (!wF) break;
    sumB += t * hist[t];
    const mB = sumB / wB, mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    if (between > best) { best = between; otsu = t; }
  }
  const R = 5, MIX = 0.75;
  for (let y = 0; y < GH; y++) for (let x = 0; x < GW; x++) {
    let s = 0, c = 0;
    for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && nx < GW && ny >= 0 && ny < GH) { s += lum[ny * GW + nx]; c++; }
    }
    const i = y * GW + x;
    sol[i] = lum[i] > otsu * (1 - MIX) + (s / c) * MIX ? 1 : 0;
  }
}

// the cross-stitch weave + sheltered flat pockets (needs regions + nbhd, so it
// runs after buildLayout()), followed by the solvability repair — sol[] is
// final once this returns. Returns the repair's flip count (for the audit).

function genRegionClues(r){
  const rng = mulberry32(SEED + r * 7919);
  const cells = regionCells[r];
  const len = cells.length;
  const local = new Map();
  for (let a = 0; a < len; a++) local.set(cells[a], a);
  const nbL = new Array(len), val = new Uint8Array(len);
  for (let a = 0; a < len; a++) {
    nbL[a] = nbhd[cells[a]].map(g => local.get(g));
    let c = 0; for (const g of nbhd[cells[a]]) c += sol[g];
    val[a] = c;
  }

  const cfg = DIFF[difficulty];
  // clue pairs within reach of each other, for cross-clue subtraction
  const pairs = new Array(len);
  for (let a = 0; a < len; a++) {
    const ax = cells[a] % GW, ay = (cells[a] / GW) | 0;
    const list = [];
    for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
      if (!dx && !dy) continue;
      const b = local.get((ay + dy) * GW + (ax + dx));
      if (b !== undefined) list.push(b);
    }
    pairs[a] = list;
  }

  const st = new Uint8Array(len);
  const given = new Uint8Array(len);
  let unknown = 0;
  function basicPass(active){
    let changed = false;
    for (let a = 0; a < len; a++) {
      if (!active[a]) continue;
      let L = 0, U = 0;
      const nb = nbL[a];
      for (let j = 0; j < nb.length; j++) { const s = st[nb[j]]; if (s === 1) L++; else if (s === 0) U++; }
      if (U === 0) continue;
      const need = val[a] - L;
      if (need === 0)      { for (let j = 0; j < nb.length; j++) if (st[nb[j]] === 0) { st[nb[j]] = 2; unknown--; } changed = true; }
      else if (need === U) { for (let j = 0; j < nb.length; j++) if (st[nb[j]] === 0) { st[nb[j]] = 1; unknown--; } changed = true; }
    }
    return changed;
  }
  // cross-clue subtraction: lights(A∖B) − lights(B∖A) = needA − needB, so
  // when needA − needB equals the unknowns exclusive to A, those all go
  // light and the unknowns exclusive to B all go dark.
  // allocation-free hot path: fixed buffers, linear membership tests
  const UAbuf = new Int32Array(9), UBbuf = new Int32Array(9);
  function nbHas(list, x){ for (let k = 0; k < list.length; k++) if (list[k] === x) return true; return false; }
  function advancedPass(active){
    let changed = false;
    for (let a = 0; a < len; a++) {
      if (!active[a]) continue;
      const nbA = nbL[a];
      let LA = 0, ua = 0;
      for (let k = 0; k < nbA.length; k++) { const s = st[nbA[k]]; if (s === 1) LA++; else if (s === 0) UAbuf[ua++] = nbA[k]; }
      if (!ua) continue;
      const needA = val[a] - LA;
      const pa = pairs[a];
      for (let pi = 0; pi < pa.length; pi++) {
        const b = pa[pi];
        if (!active[b]) continue;
        const nbB = nbL[b];
        let LB = 0, ub = 0;
        for (let k = 0; k < nbB.length; k++) { const s = st[nbB[k]]; if (s === 1) LB++; else if (s === 0) UBbuf[ub++] = nbB[k]; }
        if (!ub) continue;
        const needB = val[b] - LB;
        let xCount = 0;
        for (let k = 0; k < ua; k++) if (!nbHas(nbB, UAbuf[k])) xCount++;
        if (needA - needB !== xCount) continue;
        let applied = false;
        for (let k = 0; k < ua; k++) { const j = UAbuf[k]; if (!nbHas(nbB, j) && st[j] === 0) { st[j] = 1; unknown--; applied = true; } }
        for (let k = 0; k < ub; k++) { const j = UBbuf[k]; if (!nbHas(nbA, j) && st[j] === 0) { st[j] = 2; unknown--; applied = true; } }
        // UAbuf is stale once anything is applied — bail out and recompute
        if (applied) { changed = true; break; }
      }
    }
    return changed;
  }
  function solvesWith(active){
    st.fill(0);
    unknown = len;
    for (let a = 0; a < len; a++) if (given[a]) { st[a] = given[a]; unknown--; }
    let changed = true;
    while (changed && unknown > 0) {
      changed = basicPass(active);
      // gentle tiers stay basic-counting-only: never lean on subtraction
      if (!changed && !cfg.basicOnly) changed = advancedPass(active);
    }
    return unknown === 0;
  }

  const active = new Uint8Array(len).fill(1);
  // repairTexture() reshapes the weave so the full clue set always falls to
  // basic counting — in the game this stall fallback never fires (a given
  // here is a repair regression, hence the warn). It still runs for
  // un-repaired solutions, e.g. the region editor's raw scan, where it
  // quantifies ambiguity as pre-stitched givens.
  let stalls = 0;
  while (!solvesWith(active)) {
    let pick = -1;
    for (let a = 0; a < len; a++) if (st[a] === 0) { pick = a; break; }
    if (pick < 0) break;
    given[pick] = sol[cells[pick]] ? 1 : 2;
    stalls++;
  }
  if (stalls) console.warn('[gen] region ' + r + ' needed ' + stalls + ' starter givens (fine in the editor; a repair regression in the game)');
  // greedily strip clues while the map stays solvable at this difficulty's
  // technique level; redundancy keeps spare clues for friendlier tiers
  const order = Array.from({ length: len }, (_, a) => a);
  for (let a = order.length - 1; a > 0; a--) { const b = (rng() * (a + 1)) | 0; [order[a], order[b]] = [order[b], order[a]]; }
  for (let pass = 0; pass < cfg.passes; pass++) {
    for (const a of order) {
      if (!active[a]) continue;
      if (cfg.redundancy && rng() < cfg.redundancy) continue;
      active[a] = 0;
      if (!solvesWith(active)) active[a] = 1;
    }
  }

  // friendly free moves: easier tiers re-show pocket 0/9 clues that the
  // pruner removed (re-adding clues can never break solvability)
  const flats = [];
  for (let a = 0; a < len; a++) if (val[a] === 0 || val[a] === nbL[a].length) flats.push(a);
  if (flats.length && cfg.extremeKeep > 0) {
    let have = 0;
    for (const a of flats) if (active[a]) have++;
    const want = Math.round(flats.length * cfg.extremeKeep);
    if (want > have) {
      for (let a = flats.length - 1; a > 0; a--) { const b = (rng() * (a + 1)) | 0; [flats[a], flats[b]] = [flats[b], flats[a]]; }
      for (const a of flats) {
        if (have >= want) break;
        if (!active[a]) { active[a] = 1; have++; }
      }
    }
  }

  for (let a = 0; a < len; a++) {
    clue[cells[a]] = active[a] ? val[a] : -1;
    if (given[a]) locked[cells[a]] = given[a];
  }
}


// ============================================================
//  REGION EDITOR — draw region borders by hand over the scanned
//  pixel art. Reuses the game's dimsForImage / sampleImage / placePlots /
//  attachPlots / genRegionClues (injected ahead of this as Blocks A/B/C),
//  so the board is byte-identical to the game's. You paint walls on cell
//  edges; connected components of non-plot cells become regions. Each new
//  region opens a quote field. Export → JSON map-def → baked into index.html.
//
//  This file is injected by _build_editor.js AFTER the shared blocks, so all
//  of the game's globals/functions are in scope. Do not redeclare them.
// ============================================================

const ED = {
  img: null, imageDataURI: '', haveImage: false,
  view: { x: 0, y: 0, s: 12 },
  tool: 'draw',              // 'draw' | 'erase'
  showRegions: true,
  vWall: null, hWall: null,  // Uint8Array wall flags (1 = border)
  label: null,               // Int16Array: organic component id per cell (-2 = plot cell)
  edRegPix: 0,
  quotes: {},                // organic region id -> quote text
  prevLabel: null,
  newRegions: [],
  drag: null,                // { mode:'wall'|'pan', ... }
  lastVertex: null,          // [vx, vy] during a wall stroke
  curStroke: null,           // [{type,idx,old}, …] for undo
  hoverEdge: null,
  undo: [],
  spaceHeld: false,
};

const $ = id => document.getElementById(id);
const cv = $('cv'), cx = cv.getContext('2d');
let dpr = 1;

// wall accessors: vW(x,y) = border on the RIGHT of cell (x,y), x in 0..GW-2
//                 hW(x,y) = border BELOW cell (x,y),        y in 0..GH-2
function vW(x, y){ return ED.vWall[y * (GW - 1) + x]; }
function hW(x, y){ return ED.hWall[y * GW + x]; }
function isPlot(i){ return zoneOf[i] >= 0 || picrossOf[i] >= 0; }
// distinct overlay colour per organic region (golden-angle hue)
function regColor(r){ return `hsl(${(r * 137.508) % 360},58%,58%)`; }
function setStatus(t){ $('status').textContent = t; }

// ---------- image load + scan ----------
$('file').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  const rd = new FileReader();
  rd.onload = () => loadImageSrc(String(rd.result));
  rd.readAsDataURL(f);
});
function loadImageSrc(src){
  const im = new Image();
  im.onload = () => { ED.img = im; ED.imageDataURI = src; onImage(); };
  im.onerror = () => setStatus('Could not load that image.');
  im.src = src;
}
const RES_MIN = 2500;                                  // resolution-slider low end (cell budget)
// aspect-locked board dims from a target cell budget, never exceeding the engine cap
function dimsFromBudget(B){
  const a = ED.aspect || 1;
  let gw = Math.max(40, Math.round(Math.sqrt(B * a)));
  let gh = Math.max(40, Math.round(B / gw));
  while (gw * gh > MAXN) { if (gw >= gh) gw--; else gh--; }   // shrink the longer side until N ≤ MAXN
  return { gw, gh };
}
function resReadout(){
  const { gw, gh } = dimsFromBudget(+$('res').value);
  $('resLabel').textContent = `${gw} × ${gh} · ${(gw * gh).toLocaleString()} cells`;
  return { gw, gh };
}
// (re)scan the image at forced dims ({} = aspect-default), resetting walls/regions
function rescan(forced){
  dimsForImage(ED.img, forced);          // sets GW, GH, N (Block A)
  $('dimW').value = GW; $('dimH').value = GH;
  sampleImage(ED.img);                   // fills cellCol[], edge[], sol[] (Block B)
  ED.vWall = new Uint8Array((GW - 1) * GH);
  ED.hWall = new Uint8Array(GW * (GH - 1));
  ED.undo.length = 0;
  ED.quotes = {}; ED.prevLabel = null;
  placePlotsNow();
  ED.haveImage = true;
  detect();
  resizeCanvas(); fitView(); render();
}
// fresh image: lock to its aspect ratio, default the resolution slider, scan
function onImage(){
  ED.aspect = (ED.img.naturalWidth || 1) / (ED.img.naturalHeight || 1);
  const res = $('res');
  res.min = RES_MIN; res.max = MAXN; res.step = 250;
  res.value = Math.min(MAXN, CELL_TARGET);             // default ≈ the game's standard cell budget
  const { gw, gh } = resReadout();
  rescan({ gw, gh });
  setStatus(`Scanned ${GW}×${GH} (${(GW * GH).toLocaleString()} cells). Set the Resolution slider, then draw borders.`);
}
function placePlotsNow(){
  SEED = parseInt($('seed').value, 10) || 1;
  const pl = placePlots(SEED);           // seeded auto-placement (Block A)
  ZONES = pl.zones; PICROSS = pl.picross;
  fillPlotCells();                       // sets zoneOf/picrossOf + each plot's .cells (Block A)
}

// ---------- region detection (flood-fill, row-major first-encounter) ----------
// Row-major first-encounter id assignment exactly reproduces the game's
// growRegions compaction, so the ids the editor shows == the ids baked into
// index.html == the MAP_QUOTES keys.
function detect(){
  const lab = new Int16Array(N).fill(-1);
  for (let i = 0; i < N; i++) if (isPlot(i)) lab[i] = -2;
  let next = 0;
  const stack = [];
  for (let s = 0; s < N; s++) {
    if (lab[s] !== -1) continue;
    const id = next++;
    lab[s] = id; stack.length = 0; stack.push(s);
    while (stack.length) {
      const c = stack.pop();
      const x = c % GW, y = (c / GW) | 0;
      if (x < GW - 1 && lab[c + 1]  === -1 && !vW(x, y))     { lab[c + 1]  = id; stack.push(c + 1); }
      if (x > 0      && lab[c - 1]  === -1 && !vW(x - 1, y)) { lab[c - 1]  = id; stack.push(c - 1); }
      if (y < GH - 1 && lab[c + GW] === -1 && !hW(x, y))     { lab[c + GW] = id; stack.push(c + GW); }
      if (y > 0      && lab[c - GW] === -1 && !hW(x, y - 1)) { lab[c - GW] = id; stack.push(c - GW); }
    }
  }
  ED.edRegPix = next;

  // write the partition into the game's globals so the shared attachPlots /
  // genRegionClues operate on it (mirrors growRegions' append + bookkeeping)
  REG_PIX = next;
  REG_COUNT = REG_PIX + ZONES.length + PICROSS.length;
  for (let i = 0; i < N; i++) regionOf[i] = lab[i];           // organic id, or -2 for plot cells
  for (const z of ZONES) { z.region = REG_PIX + z.idx; for (const c of z.cells) regionOf[c] = z.region; }
  for (const p of PICROSS) { p.region = REG_PIX + ZONES.length + p.idx; for (const c of p.cells) regionOf[c] = p.region; }
  regionCells = Array.from({ length: REG_COUNT }, () => []);
  for (let i = 0; i < N; i++) regionCells[regionOf[i]].push(i);
  attachPlots();                                             // sets z.attached / p.attached (Block A)

  carryQuotes(lab);
  ED.prevLabel = lab; ED.label = lab;
  // cache each region's label position (centroid-nearest cell) so render() needn't scan all cells
  ED.labelPos = [];
  for (let r = 0; r < REG_PIX; r++) {
    const cells = regionCells[r]; if (!cells || !cells.length) { ED.labelPos[r] = null; continue; }
    let sx = 0, sy = 0; for (const i of cells) { sx += i % GW; sy += (i / GW) | 0; }
    sx /= cells.length; sy /= cells.length;
    let bi = cells[0], bd = 1e9; for (const i of cells) { const dx = i % GW - sx, dy = (i / GW | 0) - sy, d = dx * dx + dy * dy; if (d < bd) { bd = d; bi = i; } }
    ED.labelPos[r] = { x: bi % GW, y: (bi / GW) | 0 };
  }
  rebuildPanel();
}

// carry each quote onto whichever new region most overlaps the old one it was on
function carryQuotes(lab){
  const prev = ED.prevLabel;
  ED.newRegions = [];
  if (!prev) { for (let r = 0; r < ED.edRegPix; r++) ED.newRegions.push(r); return; }
  const ov = Array.from({ length: ED.edRegPix }, () => new Map());
  for (let i = 0; i < N; i++) { const a = lab[i], b = prev[i]; if (a < 0 || b < 0) continue; ov[a].set(b, (ov[a].get(b) || 0) + 1); }
  const pairs = [];
  for (let a = 0; a < ED.edRegPix; a++) for (const [b, c] of ov[a]) pairs.push([c, a, b]);
  pairs.sort((p, q) => q[0] - p[0]);
  const newQuotes = {}, usedNew = new Set(), usedOld = new Set();
  for (const [, a, b] of pairs) {
    if (usedNew.has(a) || usedOld.has(b)) continue;
    usedNew.add(a); usedOld.add(b);
    if (ED.quotes[b] !== undefined && ED.quotes[b] !== '') newQuotes[a] = ED.quotes[b];
  }
  for (let r = 0; r < ED.edRegPix; r++) if (!usedNew.has(r)) ED.newRegions.push(r);
  ED.quotes = newQuotes;
}

// ---------- view / rendering ----------
function resizeCanvas(){
  dpr = window.devicePixelRatio || 1;
  const w = cv.clientWidth, h = cv.clientHeight;
  cv.width = Math.max(1, w * dpr); cv.height = Math.max(1, h * dpr);
}
function fitView(){
  const w = cv.clientWidth, h = cv.clientHeight;
  const s = Math.min(w / GW, h / GH) * 0.95;
  ED.view.s = s;
  ED.view.x = (w - GW * s) / 2;
  ED.view.y = (h - GH * s) / 2;
}
function strokeEdge(e){
  const { x: ox, y: oy, s } = ED.view;
  if (e.type === 'v') { const px = ox + (e.x + 1) * s; cx.moveTo(px, oy + e.y * s); cx.lineTo(px, oy + (e.y + 1) * s); }
  else { const py = oy + (e.y + 1) * s; cx.moveTo(ox + e.x * s, py); cx.lineTo(ox + (e.x + 1) * s, py); }
}
function drawPlotBox(z, edge, fill, tag){
  const { x: ox, y: oy, s } = ED.view;
  const zx = ox + z.x * s, zy = oy + z.y * s, n = z.n;
  cx.fillStyle = fill; cx.fillRect(zx, zy, n * s, n * s);
  cx.strokeStyle = edge; cx.lineWidth = Math.max(2, s * 0.14); cx.strokeRect(zx, zy, n * s, n * s);
  label(tag + '→R' + z.attached, zx + n * s / 2, zy + n * s / 2, Math.max(9, s * 0.9 | 0), '#06251f');
}
function label(t, x, y, size, fill){
  cx.font = 'bold ' + size + 'px system-ui,sans-serif'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.lineWidth = 3; cx.strokeStyle = 'rgba(255,255,255,.9)'; cx.strokeText(t, x, y);
  cx.fillStyle = fill; cx.fillText(t, x, y);
}
function render(){
  if (!ED.haveImage) return;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = cv.clientWidth, H = cv.clientHeight;
  cx.clearRect(0, 0, W, H);
  const { x: ox, y: oy, s } = ED.view;
  // viewport cull — only iterate visible cells/edges (keeps high-res boards smooth)
  const gx0 = Math.max(0, Math.floor(-ox / s)), gy0 = Math.max(0, Math.floor(-oy / s));
  const gx1 = Math.min(GW - 1, Math.ceil((W - ox) / s)), gy1 = Math.min(GH - 1, Math.ceil((H - oy) / s));

  for (let gy = gy0; gy <= gy1; gy++) for (let gx = gx0; gx <= gx1; gx++) {
    const i = gy * GW + gx; cx.fillStyle = cellCol[i] || '#000'; cx.fillRect(ox + gx * s, oy + gy * s, s + 0.6, s + 0.6);
  }
  if (ED.showRegions) {
    cx.globalAlpha = 0.34;
    for (let gy = gy0; gy <= gy1; gy++) for (let gx = gx0; gx <= gx1; gx++) {
      const i = gy * GW + gx, r = regionOf[i]; if (r < 0 || r >= REG_PIX) continue;
      cx.fillStyle = regColor(r); cx.fillRect(ox + gx * s, oy + gy * s, s + 0.6, s + 0.6);
    }
    cx.globalAlpha = 1;
  }

  for (const z of ZONES) drawPlotBox(z, '#e8a04c', 'rgba(240,234,251,.55)', 'S' + z.idx);
  for (const p of PICROSS) drawPlotBox(p, '#2fb39a', 'rgba(47,179,154,.20)', 'P' + p.idx);

  // the drawn walls (culled to the visible edge range)
  cx.strokeStyle = '#15102b'; cx.lineWidth = Math.max(2, s * 0.18); cx.lineCap = 'round';
  cx.beginPath();
  for (let y = gy0; y <= gy1; y++) for (let x = Math.max(0, gx0 - 1); x <= Math.min(GW - 2, gx1); x++) if (vW(x, y)) strokeEdge({ type: 'v', x, y });
  for (let y = Math.max(0, gy0 - 1); y <= Math.min(GH - 2, gy1); y++) for (let x = gx0; x <= gx1; x++) if (hW(x, y)) strokeEdge({ type: 'h', x, y });
  cx.stroke();

  if (ED.hoverEdge) { cx.strokeStyle = ED.tool === 'erase' ? 'rgba(210,60,78,.9)' : 'rgba(240,162,36,.95)'; cx.lineWidth = Math.max(2, s * 0.18); cx.beginPath(); strokeEdge(ED.hoverEdge); cx.stroke(); }

  // region id labels (positions cached in detect())
  const pos = ED.labelPos || [];
  for (let r = 0; r < REG_PIX; r++) {
    const p = pos[r]; if (!p) continue;
    const hasQuote = ED.quotes[r] && ED.quotes[r].trim();
    label((hasQuote ? '“ ' : '') + 'R' + r, ox + (p.x + 0.5) * s, oy + (p.y + 0.5) * s, Math.max(10, s * 1.1 | 0), '#1b1330');
  }
}

// ---------- pointer → edges ----------
function vertexAt(mx, my){
  const fx = (mx - ED.view.x) / ED.view.s, fy = (my - ED.view.y) / ED.view.s;
  return [Math.max(0, Math.min(GW, Math.round(fx))), Math.max(0, Math.min(GH, Math.round(fy)))];
}
function nearestEdge(mx, my){
  const fx = (mx - ED.view.x) / ED.view.s, fy = (my - ED.view.y) / ED.view.s;
  const nvx = Math.round(fx), nhy = Math.round(fy);
  if (Math.abs(fx - nvx) <= Math.abs(fy - nhy)) {
    const x = nvx - 1, y = Math.floor(fy);
    if (x >= 0 && x <= GW - 2 && y >= 0 && y <= GH - 1) return { type: 'v', x, y };
  } else {
    const x = Math.floor(fx), y = nhy - 1;
    if (x >= 0 && x <= GW - 1 && y >= 0 && y <= GH - 2) return { type: 'h', x, y };
  }
  return null;
}
function setWall(type, x, y, val){
  const arr = type === 'v' ? ED.vWall : ED.hWall;
  const idx = type === 'v' ? y * (GW - 1) + x : y * GW + x;
  if (idx < 0 || idx >= arr.length || arr[idx] === val) return;
  if (ED.curStroke) ED.curStroke.push({ type, idx, old: arr[idx] });
  arr[idx] = val;
}
// a unit step between adjacent lattice vertices = one wall segment
function stepH(x, y, val){ if (y > 0 && y < GH && x >= 0 && x < GW) setWall('h', x, y - 1, val); } // vertex (x,y)->(x+1,y)
function stepV(x, y, val){ if (x > 0 && x < GW && y >= 0 && y < GH) setWall('v', x - 1, y, val); } // vertex (x,y)->(x,y+1)
// walk the lattice between two vertices, INTERLEAVING x/y steps so the path
// hugs the straight line (a staircase), rather than an L (all-x-then-all-y).
// A fast/diagonal drag jumps several cells per mousemove; the old L left a long
// perpendicular spur ("hanging" wall). Same segment count, no dead-end stub.
function connectVerts(v0, v1, val){
  let x = v0[0], y = v0[1]; const tx = v1[0], ty = v1[1];
  const sx = tx > x ? 1 : -1, sy = ty > y ? 1 : -1;
  const dx = Math.abs(tx - x), dy = Math.abs(ty - y);
  let ex = 0, ey = 0;                                  // steps taken on each axis
  while (x !== tx || y !== ty) {
    // step whichever axis is furthest "behind" the ideal diagonal
    if (x !== tx && (y === ty || (ex + 1) * dy <= (ey + 1) * dx)) {
      stepH(Math.min(x, x + sx), y, val); x += sx; ex++;
    } else {
      stepV(x, Math.min(y, y + sy), val); y += sy; ey++;
    }
  }
}

// ---------- mouse ----------
cv.addEventListener('contextmenu', e => e.preventDefault());
cv.addEventListener('mousedown', e => {
  if (!ED.haveImage) return;
  if (e.button === 1 || ED.spaceHeld) { ED.drag = { mode: 'pan', mx: e.clientX, my: e.clientY }; return; }
  const val = (e.button === 2 || ED.tool === 'erase') ? 0 : 1;
  ED.drag = { mode: 'wall', val };
  ED.curStroke = [];
  // canvas-local coords (must match mousemove) — using raw client coords here
  // offset the stroke's START vertex by the canvas's on-screen position, which
  // drew a stray dead-end wall from the wrong start point to the real cursor.
  const r = cv.getBoundingClientRect();
  ED.lastVertex = vertexAt(e.clientX - r.left, e.clientY - r.top);
});
addEventListener('mousemove', e => {
  if (!ED.haveImage) return;
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  if (!ED.drag) { const ne = nearestEdge(mx, my); if (JSON.stringify(ne) !== JSON.stringify(ED.hoverEdge)) { ED.hoverEdge = ne; render(); } return; }
  if (ED.drag.mode === 'pan') {
    ED.view.x += e.clientX - ED.drag.mx; ED.view.y += e.clientY - ED.drag.my;
    ED.drag.mx = e.clientX; ED.drag.my = e.clientY; render(); return;
  }
  const v = vertexAt(mx, my);
  if (v[0] !== ED.lastVertex[0] || v[1] !== ED.lastVertex[1]) { connectVerts(ED.lastVertex, v, ED.drag.val); ED.lastVertex = v; render(); }
});
addEventListener('mouseup', () => {
  if (!ED.drag) return;
  const wasWall = ED.drag.mode === 'wall';
  ED.drag = null;
  if (wasWall && ED.curStroke && ED.curStroke.length) {
    if ($('cbAutoClose').checked) autoClose();
    ED.undo.push(ED.curStroke);
    ED.curStroke = null;
    detect(); render();
  } else { ED.curStroke = null; }
});
cv.addEventListener('wheel', e => {
  if (!ED.haveImage) return;
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const k = e.deltaY < 0 ? 1.13 : 1 / 1.13;
  const ns = Math.max(3, Math.min(60, ED.view.s * k));
  ED.view.x = mx - (mx - ED.view.x) * ns / ED.view.s;
  ED.view.y = my - (my - ED.view.y) * ns / ED.view.s;
  ED.view.s = ns; render();
}, { passive: false });
addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { ED.spaceHeld = true; e.preventDefault(); }
  else if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) { e.preventDefault(); undo(); }
  else if (e.key === 'e' || e.key === 'E') setTool('erase');
  else if (e.key === 'd' || e.key === 'D') setTool('draw');
  else if (e.key === 'f' || e.key === 'F') { fitView(); render(); }
});
addEventListener('keyup', e => { if (e.code === 'Space') ED.spaceHeld = false; });

// if a stroke's endpoints land near each other, close the loop along the lattice
function autoClose(){
  const st = ED.curStroke; if (st.length < 4) return;
  // recover the stroke's start and end vertices from its first/last segment
  const seg2v = s => { const arr = s.type === 'v' ? GW - 1 : GW; const x = s.idx % arr, y = (s.idx / arr) | 0; return s.type === 'v' ? [[x + 1, y], [x + 1, y + 1]] : [[x, y + 1], [x + 1, y + 1]]; };
  const a = seg2v(st[0]), b = seg2v(st[st.length - 1]);
  // choose the closest pair of endpoints between the two ends
  let best = null, bd = 1e9;
  for (const p of a) for (const q of b) { const d = Math.abs(p[0] - q[0]) + Math.abs(p[1] - q[1]); if (d > 0 && d < bd) { bd = d; best = [p, q]; } }
  if (best && bd <= 4) connectVerts(best[0], best[1], 1);
}

function undo(){
  if (!ED.undo.length) { setStatus('Nothing to undo.'); return; }
  const st = ED.undo.pop();
  for (let i = st.length - 1; i >= 0; i--) { const c = st[i]; const arr = c.type === 'v' ? ED.vWall : ED.hWall; arr[c.idx] = c.old; }
  detect(); render();
}

// ---------- helpers: walls from image edges, solvability check ----------
function rgbOf(i){ const m = /(\d+)\D+(\d+)\D+(\d+)/.exec(cellCol[i] || ''); return m ? [+m[1], +m[2], +m[3]] : [0, 0, 0]; }
function grad(i, j){ const a = rgbOf(i), b = rgbOf(j); return Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1]) + Math.abs(a[2] - b[2]); }
function wallsFromEdges(){
  const t = parseInt($('magThresh').value, 10) || 220;
  ED.curStroke = [];
  for (let y = 0; y < GH; y++) for (let x = 0; x < GW - 1; x++) if (grad(y * GW + x, y * GW + x + 1) >= t) setWall('v', x, y, 1);
  for (let y = 0; y < GH - 1; y++) for (let x = 0; x < GW; x++) if (grad(y * GW + x, (y + 1) * GW + x) >= t) setWall('h', x, y, 1);
  if (ED.curStroke.length) { ED.undo.push(ED.curStroke); }
  ED.curStroke = null;
  detect(); render();
  setStatus(`Added walls where image gradient ≥ ${t}. Prune with the eraser, then redraw cleanly.`);
}
function buildNbhd(){
  for (let y = 0; y < GH; y++) for (let x = 0; x < GW; x++) {
    const i = y * GW + x; const list = [];
    for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) { const nx = x + dx, ny = y + dy; if (nx >= 0 && nx < GW && ny >= 0 && ny < GH && regionOf[ny * GW + nx] === regionOf[i]) list.push(ny * GW + nx); }
    nbhd[i] = list;
  }
}
// run the game's own clue generator per region and report ambiguous tiles —
// spots the raw scan can't solve by pure logic. The shipped game repairs
// these away with texture flips (repairTexture), so each costs a flipped
// stitch pixel in-game, never a pre-filled square.
function checkSolvable(){
  if (!ED.haveImage) return;
  buildNbhd();
  clue.fill(-1); locked.fill(0);
  let total = 0, worst = [];
  for (let r = 0; r < REG_PIX; r++) {
    try { genRegionClues(r); } catch (err) { setStatus('Clue gen error on R' + r + ': ' + err.message); return; }
    let g = 0; for (const c of regionCells[r]) if (locked[c]) g++;
    total += g; worst.push({ r, g, sz: regionCells[r].length });
  }
  worst.sort((a, b) => b.g - a.g);
  const tiny = worst.filter(w => w.sz < 70).length;
  const top = worst.slice(0, 3).map(w => `R${w.r}:${w.g}`).join('  ');
  setStatus(`Solvable ✓ (difficulty: ${difficulty}). ${total} ambiguous tile(s) across ${REG_PIX} regions (repaired in-game, never pre-filled)${tiny ? `, ${tiny} tiny region(s) <70 cells` : ''}. Heaviest: ${top}.`);
  rebuildPanel();
}

// ---------- region/quote panel ----------
function rebuildPanel(){
  const panel = $('panel'); panel.innerHTML = '';
  const att = Array.from({ length: REG_PIX }, () => []);
  ZONES.forEach(z => { if (att[z.attached]) att[z.attached].push('S' + z.idx); });
  PICROSS.forEach(p => { if (att[p.attached]) att[p.attached].push('P' + p.idx); });
  for (let r = 0; r < REG_PIX; r++) {
    const sz = regionCells[r] ? regionCells[r].length : 0;
    const row = document.createElement('div'); row.className = 'rrow' + (ED.newRegions.indexOf(r) >= 0 ? ' fresh' : '');
    const sw = document.createElement('span'); sw.className = 'sw'; sw.style.background = regColor(r);
    const lab = document.createElement('span'); lab.className = 'rlab'; lab.textContent = 'R' + r;
    const meta = document.createElement('span'); meta.className = 'rmeta';
    meta.textContent = sz + ' cells' + (att[r].length ? ' · +' + att[r].join(',') : '') + (sz < 70 ? ' · ⚠small' : '');
    const inp = document.createElement('input'); inp.type = 'text'; inp.placeholder = 'quote shown on completion (optional)'; inp.value = ED.quotes[r] || '';
    inp.oninput = () => { ED.quotes[r] = inp.value; };
    row.appendChild(sw); row.appendChild(lab); row.appendChild(meta); row.appendChild(inp);
    panel.appendChild(row);
  }
  $('regCount').textContent = REG_PIX + ' regions';
  // focus the newest region's quote field
  if (ED.newRegions.length && ED.prevLabel) {
    const idx = ED.newRegions[0];
    const rows = panel.querySelectorAll('.rrow input');
    if (rows[idx]) { rows[idx].focus(); rows[idx].scrollIntoView({ block: 'nearest' }); }
  }
}

// ---------- export ----------
function exportMapDef(){
  if (!ED.haveImage) { setStatus('Load an image first.'); return; }
  const rle = []; let i = 0;
  while (i < N) { const v = ED.label[i]; let j = i + 1; while (j < N && ED.label[j] === v) j++; rle.push(v, j - i); i = j; }
  const name = ($('mapName').value || '').trim() || 'New Map';
  const id = (name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '')) || 'map';
  const quotes = {};
  for (const k in ED.quotes) if (ED.quotes[k] && ED.quotes[k].trim()) quotes[k] = ED.quotes[k].trim();
  // bake a board-resolution PNG so index.html stays lean. The game re-samples
  // any src down to GW×GH (smoothing off) anyway, so at 1:1 this reproduces the
  // exact same colours/edges/solution the editor showed — just ~kilobytes.
  const off = document.createElement('canvas'); off.width = GW; off.height = GH;
  const octx = off.getContext('2d'); octx.imageSmoothingEnabled = false;
  octx.drawImage(ED.img, 0, 0, GW, GH);
  const bakedURI = off.toDataURL('image/png');
  const def = {
    name, id, seed: SEED, gw: GW, gh: GH,
    imageDataURI: bakedURI,
    regPix: ED.edRegPix,
    regionRLE: rle,
    zones: ZONES.map(z => ({ x: z.x, y: z.y, n: z.n, boxW: z.boxW, boxH: z.boxH, jigsaw: z.jigsaw, givens: z.givens })),
    picross: PICROSS.map(p => ({ x: p.x, y: p.y, n: p.n })),
    attach: { zones: ZONES.map(z => z.attached), picross: PICROSS.map(p => p.attached) },
    quotes,
  };
  const json = JSON.stringify(def);
  $('exportArea').value = json;
  $('exportWrap').style.display = 'block';
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = $('dl'); a.href = url; a.download = id + '.npxsmap.json';
  setStatus(`Exported "${name}" — ${ED.edRegPix} regions, ${Object.keys(quotes).length} quotes. Download or copy, then hand it to Claude to bake in.`);
}

// ---------- toolbar wiring ----------
function setTool(t){ ED.tool = t; $('btnDraw').classList.toggle('on', t === 'draw'); $('btnErase').classList.toggle('on', t === 'erase'); }
$('btnDraw').onclick = () => setTool('draw');
$('btnErase').onclick = () => setTool('erase');
$('btnClear').onclick = () => { if (!ED.haveImage) return; ED.undo.push(captureAll()); ED.vWall.fill(0); ED.hWall.fill(0); detect(); render(); };
$('btnUndo').onclick = undo;
$('btnFit').onclick = () => { fitView(); render(); };
$('btnZoomIn').onclick = () => { ED.view.s = Math.min(60, ED.view.s * 1.25); render(); };
$('btnZoomOut').onclick = () => { ED.view.s = Math.max(3, ED.view.s / 1.25); render(); };
$('cbShowRegions').onchange = e => { ED.showRegions = e.target.checked; render(); };
$('btnMagnet').onclick = wallsFromEdges;
$('btnCheck').onclick = checkSolvable;
$('btnExport').onclick = exportMapDef;
$('btnReroll').onclick = () => { if (!ED.haveImage) return; $('seed').value = ((Math.random() * 1e6) | 0) + 1; placePlotsNow(); detect(); render(); };
$('btnRescan').onclick = () => { if (!ED.img) return; const fw = parseInt($('dimW').value, 10), fh = parseInt($('dimH').value, 10); rescan((fw >= 20 && fh >= 20) ? { gw: fw, gh: fh } : {}); setStatus(`Rescanned ${GW}×${GH} (${(GW * GH).toLocaleString()} cells).`); };
// resolution slider (aspect-locked): live readout while dragging; apply (resets walls) on release
$('res').addEventListener('input', () => { if (ED.haveImage) resReadout(); });
$('res').addEventListener('change', () => { if (!ED.haveImage) return; const { gw, gh } = resReadout(); rescan({ gw, gh }); setStatus(`Resolution: ${GW}×${GH} · ${(GW * GH).toLocaleString()} cells. Borders reset — draw away.`); });
// ± buttons: nudge the cell budget by 1% of the CURRENT board (compounds), then
// rescan from the exact computed budget (not the slider's snapped value)
function nudgeRes(factor){
  if (!ED.haveImage) return;
  const B = Math.max(RES_MIN, Math.min(MAXN, Math.round(GW * GH * factor)));
  const { gw, gh } = dimsFromBudget(B);
  if (gw === GW && gh === GH) { setStatus(`Already at ${GW}×${GH} — 1% is below one row/column here; press again or drag the slider.`); return; }
  $('res').value = B; resReadout();
  rescan({ gw, gh });
  setStatus(`Resolution: ${GW}×${GH} · ${(GW * GH).toLocaleString()} cells (${factor > 1 ? '+' : '−'}1%). Borders reset — draw away.`);
}
$('btnResUp').onclick = () => nudgeRes(1.01);
$('btnResDown').onclick = () => nudgeRes(0.99);
$('btnCopy').onclick = () => { $('exportArea').select(); try { document.execCommand('copy'); setStatus('Copied JSON to clipboard.'); } catch (e) { setStatus('Select the text and copy manually.'); } };
function captureAll(){ const st = []; for (let k = 0; k < ED.vWall.length; k++) if (ED.vWall[k]) st.push({ type: 'v', idx: k, old: 1 }); for (let k = 0; k < ED.hWall.length; k++) if (ED.hWall[k]) st.push({ type: 'h', idx: k, old: 1 }); return st; }

addEventListener('resize', () => { if (ED.haveImage) { resizeCanvas(); render(); } });
setTool('draw');
setStatus('Load a pixel-art image to begin.');

</script></body></html>
